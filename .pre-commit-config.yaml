repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Run ruff formatter
        language: system
        entry: sh -c "docker run -v $(pwd):/io --rm ghcr.io/astral-sh/ruff:latest format src/ migrations/"
        pass_filenames: false

      - id: ruff-check
        name: Run ruff linter
        language: system
        entry: sh -c "docker run -v $(pwd):/io --rm ghcr.io/astral-sh/ruff:latest check --fix src/ migrations/"
        pass_filenames: false
