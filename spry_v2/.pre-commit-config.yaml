repos:
  - repo: local
    hooks:
      - id: ruff formatter
        name: Run ruff formatter
        language: system
        entry: sh -c "docker run --pull always -v $(pwd):/io --rm ghcr.io/astral-sh/ruff:latest format src/ migrations/"

      - id: ruff linter
        name: Run ruff linter
        language: system
        entry: sh -c "docker run --pull always -v $(pwd):/io --rm ghcr.io/astral-sh/ruff:latest check --fix src/ migrations/"

