<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spry Invite</title>
</head>
<body style="margin:0; padding:0; background-color:#f9f9fb; font-family:Roboto, Arial, sans-serif; color:#1a1a1a;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
    <tr>
      <td align="center" style="padding: 40px 16px;">
        <!-- Card Container -->
        <table role="presentation" width="528" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff; border:1px solid #ebebed; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.03); padding:32px;">
          <!-- Header -->
          <tr>
            <td align="left" style="padding-bottom: 32px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align: middle; padding-right: 10px;">
                    <img src="https://spryplan.com/logo%20128px.png" alt="Spry Plan" width="27" style="display:inline-block;">
                  </td>
                  <td style="font-size:14px; font-weight:500; line-height:16px; color:#1a1a1a;">Spry Plan</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="font-size:16px; font-weight:500; line-height:24px; color:#1a1a1a; padding-bottom: 24px;">
              <strong>{{administrator_name}}</strong> invited you to join <strong>{{organisation_name}}</strong> on Spry
            </td>
          </tr>

          <tr>
            <td style="font-size:14px; font-weight:400; line-height:20px; color:#474747; padding-bottom: 24px;">
              Spry is the [short description of the app]
            </td>
          </tr>

          <tr>
            <td style="font-size:14px; font-weight:400; line-height:20px; color:#474747; padding-bottom: 24px;">
              No more boring, aimless meetings – with Spry, every conversation counts. Let’s turn meetings into something to look forward to 🚀
            </td>
          </tr>

          <!-- Button -->
          <tr>
            <td align="center" style="padding-bottom: 0;">
              <a href="https://app.spryplan.com/login" target="_blank" style="display:inline-block; background-color:#ffcf40; border-radius:8px; text-align:center; padding:12px 24px; font-size:14px; font-weight:500; line-height:16px; color:#000000; text-decoration:none; width: 464px">
                Join Spry
              </a>
            </td>
          </tr>
        </table>

        <!-- Footer -->
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="528" style="margin-top:24px;">
          <tr>
            <td style="font-size:14px; font-weight:400; line-height:20px; color:#919191;">
              Learn more at <a href="https://spryplan.com" target="_blank" style="color:#096DD9; text-decoration:none;">spryplan.com</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
